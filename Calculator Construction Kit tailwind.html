  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ollbar) */\n  .panel::-webkit-scrollbar { width: 9px; }\n  .panel::-webkit-scrollbar-thumb { background: #d4d1c9; border-radius: 99px; border: 2px solid #f7f6f3; }\n\n  /* range slider thumbs */\n  .cck-range { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 99px; background: #ddd9d0; outline: none; cursor: pointer; }\n  .cck-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #2f2e2b; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer; }\n  .cck-range::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #2f2e2b; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer; }\n\n  /* toggle switch */\n  .switch { position: relative; width: 40px; height: 23px; flex-shrink: 0; cursor: pointer; }\n  .switch input { opacity: 0; width: 0; height: 0; }\n  .switch .track { position: absolute; inset: 0; background: #d6d2c9; border-radius: 99px; transition: background .16s; }\n  .switch .track::after { content: \"\"; position: absolute; top: 2px; left: 2px; width: 19px; height: 19px; background: #fff; border-radius: 50%; transition: transform .16s; box-shadow: 0 1px 3px rgba(0,0,0,.25); }\n  .switch input:checked + .track { background: #2f2e2b; }\n  .switch input:checked + .track::after { transform: translateX(17px); }\n\n  /* stage dotted backdrop */\n  .stage-grid { position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,.10) 1px, transparent 0); background-size: 26px 26px; opacity: .5; pointer-events: none; }\n\n  /* ============ CALCULATOR ENGINE (CSS-variable driven, stateful) ============ */\n  .calc {\n    --neu-dark: color-mix(in srgb, var(--body-bg), #000 22%);\n    --neu-light: color-mix(in srgb, var(--body-bg), #fff 62%);\n    transition: border-radius .2s, padding .2s, background .25s, box-shadow .25s, border-width .2s, width .2s;\n  }\n  .btn { transiti 4e9f0', digitText:'#5a6072', opBg:'#e4e9f0', opText:'#6d7fd6',\n    fnBg:'#e4e9f0', fnText:'#9aa0b0', eqBg:'#6d7fd6', eqText:'#ffffff', opBorder:'#e4e9f0',\n    borderCol:'#e4e9f0', font:'Sora', shape:'Rounded', shadow:'neu', press:'sink',\n    borderW:0, bodyRadius:34, btnRadius:18, gap:14, bodyPad:22 } },\n  Brutalist: { swatch:['#fff8e8','#ffe600','#111111'], v:{\n    stageBg:'#fff3d6', bodyBg:'#fff8e8', displayBg:'#ffffff', displayText:'#111111',\n    digitBg:'#ffffff', digitText:'#111111', opBg:'#ffe600', opText:'#111111',\n    fnBg:'#d8d2c2', fnText:'#111111', eqBg:'#111111', eqText:'#ffffff', opBorder:'#111111',\n    borderCol:'#111111', font:'Mono', shape:'Square', shadow:'hard', press:'pop',\n    borderW:3, bodyRadius:6, btnRadius:4, gap:10 } },\n  Candy: { swatch:['#fff0f6','#ff6fb5','#7c6cf0'], v:{\n    stageBg:'#ffe3ef', bodyBg:'#fff0f6', displayBg:'#ffffff', displayText:'#6b2a52',\n    digitBg:'#ffe0ee', digitText:'#a03a73', opBg:'#ff6fb5', opText:'#ffffff',\n    fnBg:'#ffd2e6', fnText:'#a03a73', eqBg:'#7c6cf0', eqText:'#ffffff', opBorder:'#ff6fb5',\n    borderCol:'#ffd2e6', font:'Grotesk', shape:'Pill', shadow:'soft', press:'pop',\n    borderW:0, bodyRadius:36, btnRadius:30, gap:11 } },\n  Terminal: { swatch:['#04140a','#0a2a16','#39ff7a'], v:{\n    stageBg:'#02080a', bodyBg:'#04140a', displayBg:'#021008', displayText:'#39ff7a',\n    digitBg:'#082817', digitText:'#39ff7a', opBg:'#0d3a22', opText:'#7dffae',\n    fnBg:'#0a2415', fnText:'#39ff7a', eqBg:'#39ff7a', eqText:'#021008', opBorder:'#1f6b3f',\n    borderCol:'#1f6b3f', font:'Mono', shape:'Square', shadow:'glow', press:'push',\n    borderW:1, bodyRadius:8, btnRadius:5, gap:8 } },\n};\n\nlet state = load() || {...DEFAULTS};\n\nfunction load(){ try { const s = JSON.parse(localStorage.getItem('cck_state')); return s && typeof s==='object' ? {...DEFAULTS, ...s} : null; } catch(e){ return null; } }\nfunction save(){ try { localStorage.setItem('cck_state', JSON.stringify(state)); } catch(e){} }\n\n/* ===================== APPLY ===================== */\nconst calc = document.getElementById('calc');\nconst stage = document.getElementById('stage');\nconst display = document.getElementById('display');\n\nfunction applyState(){\n  const px = v => v + 'px';\n  const setV = (k,val)=>calc.style.setProperty(k,val);\n  setV('--body-bg', state.bodyBg);\n  setV('--display-bg', state.displayBg);\n  setV('--display-text', state.displayText);\n  setV('--digit-bg', state.digitBg);\n  setV('--digit-text', state.digitText);\n  setV('--op-bg', state.opBg);\n  setV('--op-text', state.opText);\n  setV('--op-border', state.borderW>0 ? state.opBorder : 'transparent');\n  setV('--fn-bg', state.fnBg);\n  setV('--fn-text', state.fnText);\n  setV('--eq-bg', state.eqBg);\n  setV('--eq-text', state.eqText);\n  setV('--border-col', state.borderCol);\n  setV('--display-size', px(state.displaySize));\n  setV('--btn-size', px(state.btnSize));\n  setV('--btn-weight', state.btnWeight);\n  setV('--body-r', px(state.bodyRadius));\n  const isCircle = state.shape === 'Circle';\n  setV('--btn-r', isCircle ? '50%' : px(state.btnRadius));\n  setV('--gap', px(state.gap));\n  setV('--body-pad', px(state.bodyPad));\n  setV('--display-h', px(state.displayH));\n  setV('--btn-pad', px(state.btnPad));\n  setV('--border-w', px(state.borderW));\n  setV('--calc-w', px(state.calcW));\n  setV('--calc-font', FONTS[state.font]);\n  setV('--display-align', state.align);\n  setV('--display-items', state.align==='left'?'flex-start':state.align==='center'?'center':'flex-end');\n\n  calc.dataset.shadow = state.shadow;\n  calc.dataset.press = state.press;\n  calc.dataset.circle = isCircle ? '1' : '0';\n  stage.style.background = state.stageBg;\n  display.classList.toggle('blur', state.blurDisplay);\n  document.getElementById('expr').style.display = state.showExpr ? '' : 'none';\n  save();\n}\n\n/* ===================== KEYPAD ===================== */\nconst KEYS = [\n  {l:'AC',t:'fn',a:'clear'}, {l:'±',t:'fn',a:'sign'}, {l:'%',t:'fn',a:'percent'}, {l:'÷',t:'op',a:'op',v:'/'},\n  {l:'7',t:'digit',a:'num'}, {l:'8',t:'digit',a:'num'}, {l:'9',t:'digit',a:'num'}, {l:'×',t:'op',a:'op',v:'*'},\n  {l:'4',t:'digit',a:'num'}, {l:'5',t:'digit',a:'num'}, {l:'6',t:'digit',a:'num'}, {l:'−',t:'op',a:'op',v:'-'},\n  {l:'1',t:'digit',a:'num'}, {l:'2',t:'digit',a:'num'}, {l:'3',t:'digit',a:'num'}, {l:'+',t:'op',a:'op',v:'+'},\n  {l:'0',t:'digit',a:'num',id:'zero'}, {l:'.',t:'digit',a:'dot'}, {l:'=',t:'eq',a:'equals',id:'eq'},\n];\n\nconst BTN_BASE = 'btn flex items-center justify-center leading-none cursor-pointer select-none border-solid [border-width:var(--border-w)] [border-radius:var(--btn-r)] [font-size:var(--btn-size)] [font-weight:var(--btn-weight)] [padding:var(--btn-pad)_0]';\nconst BTN_TYPE = {\n  digit:'[background:var(--digit-bg)] [color:var(--digit-text)] border-transparent',\n  op:'[background:var(--op-bg)] [color:var(--op-text)] [border-color:var(--op-border)]',\n  fn:'[background:var(--fn-bg)] [color:var(--fn-text)] border-transparent',\n  eq:'[background:var(--eq-bg)] [color:var(--eq-text)] border-transparent',\n};\n\nfunction buildKeypad(){\n  const kp = document.getElementById('keypad');\n  kp.innerHTML = '';\n  KEYS.forEach(k=>{\n    const b = document.createElement('button');\n    b.className = BTN_BASE + ' ' + BTN_TYPE[k.t];\n    b.dataset.t = k.t;\n    b.textContent = k.l;\n    if(k.id==='zero' && state.zeroDouble){ b.style.gridColumn = 'span 2'; if(!calc.dataset.circle || calc.dataset.circle==='0') b.style.aspectRatio='auto'; }\n    if(k.id==='eq' && !state.zeroDouble){ b.style.gridColumn = 'span 2'; }\n    b.addEventListener('click', ()=>doAction(k));\n    kp.appendChild(b);\n  });\n}\n\n/* ===================== CALC LOGIC ===================== */\nconst C = { cur:'0', prev:null, op:null, fresh:true, exprText:'' };\nconst SYM = {'/':'÷','*':'×','-':'−','+':'+'};\n\nfunction fmtNum(str){\n  if(str==='Error') return str;\n  let neg = str.startsWith('-'); if(neg) str = str.slice(1);\n  let [int,dec] = str.split('.');\n  if(state.separators) int = int.replace(/\\B(?=(\\d{3})+(?!\\d))/g, ',');\n  let out = int + (str.includes('.') ? '.' + (dec||'') : '');\n  return (neg?'-':'') + out;\n}\nfunction clean(n){\n  if(!isFinite(n)) return 'Error';\n  let r = Number(n.toPrecision(12));\n  return String(r);\n}\nfunction render(){\n  document.getElementById('main').textContent = fmtNum(C.cur);\n  document.getElementById('expr').textContent = C.exprText;\n}\nfunction doAction(k){\n  switch(k.a){\n    case 'num':\n      if(C.cur==='Error'){ C.cur='0'; C.fresh=true; }\n      if(C.fresh){ C.cur = k.l; C.fresh=false; }\n      else { C.cur = (C.cur==='0') ? k.l : C.cur + k.l; }\n      break;\n    case 'dot':\n      if(C.fresh){ C.cur='0.'; C.fresh=false; }\n      else if(!C.cur.includes('.')) C.cur += '.';\n      break;\n    case 'clear':\n      C.cur='0'; C.prev=null; C.op=null; C.fresh=true; C.exprText=''; break;\n    case 'sign':\n      if(C.cur!=='0' && C.cur!=='Error') C.cur = C.cur.startsWith('-') ? C.cur.slice(1) : '-'+C.cur; break;\n    case 'percent':\n      C.cur = clean(parseFloat(C.cur)/100); C.fresh=true; break;\n    case 'op':\n      if(C.op!==null && !C.fresh){ compute(); }\n      else { C.prev = parseFloat(C.cur); }\n      C.op = k.v; C.fresh=true;\n      C.exprText = fmtNum(clean(C.prev)) + ' ' + SYM[k.v];\n      break;\n    case 'equals':\n      if(C.op!==null){\n        C.exprText = fmtNum(clean(C.prev)) + ' ' + SYM[C.op] + ' ' + fmtNum(C.cur) + ' =';\n        compute(); C.fresh=true;\n      }\n      break;\n  }\n  render();\n}\nfunction compute(){\n  if(C.op===null || C.prev===null) return;\n  const a = C.prev, b = parseFloat(C.cur); let r;\n  switch(C.op){ case '+':r=a+b;break; case '-':r=a-b;break; case '*':r=a*b;break; case '/':r=b===0?NaN:a/b;break; }\n  C.cur = clean(r); C.prev = (C.cur==='Error')?null:parseFloat(C.cur); C.op=null;\n}\n\n/* keyboard */\nwindow.addEventListener('keydown', e=>{\n  const map = {'/':'/','*':'*','-':'-','+':'+'};\n  if(e.key>='0' && e.key<='9'){ doAction({a:'num',l:e.key}); render(); }\n  else if(e.key==='.'){ doAction({a:'dot'}); }\n  else if(map[e.key]){ doAction({a:'op',v:map[e.key]}); }\n  else if(e.key==='Enter' || e.key==='='){ e.preventDefault(); doAction({a:'equals'}); }\n  else if(e.key==='Escape'){ doAction({a:'clear'}); }\n  else if(e.key==='Backspace'){\n    if(!C.fresh && C.cur!=='Error'){ C.cur = C.cur.length<=1 || (C.cur.length===2&&C.cur.startsWith('-')) ? '0' : C.cur.slice(0,-1); if(C.cur==='0') C.fresh=true; render(); }\n  }\n});\n\n/* ===================== PANEL BUILD ===================== */\nconst COLOR_FIELDS = [\n  ['stageBg','Stage'], ['bodyBg','Body'], ['displayBg','Display'], ['displayText','Display text'],\n  ['digitBg','Digits'], ['digitText','Digit text'], ['opBg','Operators'], ['opText','Operator text'],\n  ['fnBg','Functions'], ['fnText','Function text'], ['eqBg','Equals'], ['eqText','Equals text'],\n];\nconst SLIDERS_TYPE = [\n  ['displaySize','Display size','px',24,84,1],\n  ['btnSize','Button size','px',13,40,1],\n  ['btnWeight','Button weight','',300,800,100],\n];\nconst SLIDERS_SHAPE = [\n  ['calcW','Calculator width','px',250,440,2],\n  ['bodyRadius','Body radius','px',0,56,1],\n  ['btnRadius','Button radius','px',0,44,1],\n  ['gap','Button gap','px',2,22,1],\n  ['bodyPad','Body padding','px',6,40,1],\n  ['displayH','Display height','px',60,220,2],\n  ['btnPad','Button height','px',8,40,1],\n  ['borderW','Border width','px',0,6,1],\n];\n\nconst SEG_ON = ['bg-white','text-chrome-ink','shadow-sm'];\nfunction segActivate(seg, btn){\n  seg.querySelectorAll('button').forEach(x=>{ x.classList.remove(...SEG_ON); x.classList.add('text-chrome-mute'); });\n  btn.classList.remove('text-chrome-mute'); btn.classList.add(...SEG_ON);\n}\n\nfunction makeSection(title){\n  const s=document.createElement('div');\n  s.className='py-[18px] border-b border-chrome-line last:border-b-0';\n  s.innerHTML=`<div class=\"font-mono text-[10.5px] tracking-[0.16em] uppercase text-chrome-mute mb-3.5 flex items-center gap-2\"><span>${title}<\u002Fspan><span class=\"flex-1 h-px bg-chrome-line\"><\u002Fspan><\u002Fdiv>`;\n  return s;\n}\n\nfunction sliderCtrl([key,label,unit,min,max,step]){\n  const wrap=document.createElement('div'); wrap.className='mb-3.5';\n  wrap.innerHTML=`<div class=\"flex justify-between items-baseline mb-2\"><span class=\"text-[12.5px] font-medium\">${label}<\u002Fspan><em class=\"font-mono not-italic text-[11px] text-chrome-mute\">${state[key]}${unit}<\u002Fem><\u002Fdiv>`;\n  const inp=document.createElement('input'); inp.type='range'; inp.className='cck-range w-full';\n  inp.min=min; inp.max=max; inp.step=step; inp.value=state[key];\n  inp.addEventListener('input', ()=>{\n    state[key]=parseFloat(inp.value);\n    wrap.querySelector('em').textContent = state[key]+unit;\n    applyState();\n  });\n  wrap.appendChild(inp);\n  return wrap;\n}\n\nfunction segCtrl(label, key, options, onpick){\n  const wrap=document.createElement('div'); wrap.className='mb-3.5';\n  wrap.innerHTML=`<div class=\"flex justify-between items-baseline mb-2\"><span class=\"text-[12.5px] font-medium\">${label}<\u002Fspan><\u002Fdiv>`;\n  const seg=document.createElement('div'); seg.className='flex gap-1 bg-[#ebe8e1] p-[3px] rounded-[10px]';\n  options.forEach(opt=>{\n    const b=document.createElement('button'); b.textContent=opt;\n    b.className='flex-1 text-[11.5px] font-medium py-[7px] px-1 rounded-[7px] cursor-pointer transition whitespace-nowrap text-chrome-mute';\n    if(state[key]===opt){ b.classList.remove('text-chrome-mute'); b.classList.add(...SEG_ON); }\n    b.addEventListener('click', ()=>{\n      segActivate(seg, b);\n      if(onpick) onpick(opt); else state[key]=opt;\n      applyState(); if(key==='shape'||key==='zeroDouble') buildKeypad();\n    });\n    seg.appendChild(b);\n  });\n  wrap.appendChild(seg);\n  return wrap;\n}\n\nfunction swatchInput(key){\n  const sw=document.createElement('div');\n  sw.className='relative w-[30px] h-[30px] rounded-lg border border-black/10 overflow-hidden cursor-pointer shrink-0';\n  const inp=document.createElement('input'); inp.type='color';\n  inp.className='absolute -inset-1.5 w-[150%] h-[150%] cursor-pointer'; inp.value=state[key];\n  inp.addEventListener('input', ()=>{ state[key]=inp.value; applyState(); });\n  sw.appendChild(inp);\n  return {sw, inp};\n}\n\nfunction colorCtrl([key,label]){\n  const row=document.createElement('div'); row.className='flex items-center gap-[9px]';\n  const {sw, inp}=swatchInput(key);\n  const lab=document.createElement('label'); lab.className='text-xs flex-1'; lab.textContent=label;\n  row.appendChild(sw); row.appendChild(lab);\n  return {row, inp};\n}\n\nfunction toggleCtrl(label, key, after){\n  const row=document.createElement('div'); row.className='flex items-center justify-between py-[7px]';\n  const span=document.createElement('span'); span.className='text-[12.5px] font-medium'; span.textContent=label;\n  const sw=document.createElement('label'); sw.className='switch';\n  const inp=document.createElement('input'); inp.type='checkbox'; inp.checked=state[key];\n  const tr=document.createElement('span'); tr.className='track';\n  inp.addEventListener('change', ()=>{ state[key]=inp.checked; applyState(); if(after) after(); });\n  sw.appendChild(inp); sw.appendChild(tr);\n  row.appendChild(span); row.appendChild(sw);\n  return row;\n}\n\nlet colorInputs = {};\nlet presetEls = [];\n\nfunction buildPanel(){\n  const body=document.getElementById('panelBody');\n  body.innerHTML='';\n\n  // PRESETS\n  const sP=makeSection('Presets');\n  const grid=document.createElement('div'); grid.className='grid grid-cols-3 gap-2';\n  presetEls=[];\n  Object.entries(PRESETS).forEach(([name,def])=>{\n    const btn=document.createElement('button');\n    btn.className='preset cursor-pointer border border-chrome-line rounded-[10px] p-2 bg-white text-left transition hover:border-[#b9b5ab] active:translate-y-px';\n    btn.innerHTML=`<div class=\"flex gap-[3px] mb-[7px]\">${def.swatch.map(c=>`<span class=\"w-full h-4 rounded-[4px]\" style=\"background:${c}\"><\u002Fspan>`).join('')}<\u002Fdiv><b class=\"text-[11px] font-medium tracking-tight\">${name}<\u002Fb>`;\n    btn.addEventListener('click', ()=>applyPreset(name));\n    btn.dataset.name=name;\n    grid.appendChild(btn); presetEls.push(btn);\n  });\n  sP.appendChild(grid); body.appendChild(sP);\n\n  // COLORS\n  const sC=makeSection('Colors');\n  const cg=document.createElement('div'); cg.className='grid grid-cols-2 gap-x-3 gap-y-[9px]';\n  colorInputs={};\n  COLOR_FIELDS.forEach(f=>{ const {row,inp}=colorCtrl(f); cg.appendChild(row); colorInputs[f[0]]=inp; });\n  sC.appendChild(cg); body.appendChild(sC);\n\n  // TYPOGRAPHY\n  const sT=makeSection('Typography');\n  sT.appendChild(segCtrl('Font', 'font', Object.keys(FONTS), opt=>{ state.font=opt; }));\n  SLIDERS_TYPE.forEach(s=>sT.appendChild(sliderCtrl(s)));\n  sT.appendChild(segCtrl('Display align','align',['left','center','right']));\n  body.appendChild(sT);\n\n  // SHAPE\n  const sS=makeSection('Shape & Layout');\n  sS.appendChild(segCtrl('Button shape','shape', Object.keys(SHAPE_RADIUS), opt=>{\n    state.shape=opt;\n    if(opt!=='Circle' && SHAPE_RADIUS[opt]!==999){ state.btnRadius = SHAPE_RADIUS[opt]; }\n    rebuildSliders();\n  }));\n  sliderRefs={};\n  SLIDERS_SHAPE.forEach(s=>{ const c=sliderCtrl(s); sliderRefs[s[0]]=c; sS.appendChild(c); });\n  body.appendChild(sS);\n\n  // EFFECTS\n  const sE=makeSection('Effects');\n  sE.appendChild(segCtrl('Shadow','shadow',['none','soft','hard','neu','glow']));\n  sE.appendChild(segCtrl('Press','press',['none','push','sink','pop']));\n  sE.appendChild(colorRowSingle('borderCol','Border color'));\n  body.appendChild(sE);\n\n  // STRUCTURE\n  const sStr=makeSection('Structure');\n  sStr.appendChild(toggleCtrl('Double-width zero','zeroDouble', buildKeypad));\n  sStr.appendChild(toggleCtrl('Show expression line','showExpr'));\n  sStr.appendChild(toggleCtrl('Thousands separators','separators', render));\n  sStr.appendChild(toggleCtrl('Blur display','blurDisplay'));\n  body.appendChild(sStr);\n}\n\nlet sliderRefs={};\nfunction colorRowSingle(key,label){\n  const wrap=document.createElement('div'); wrap.className='mb-3.5';\n  const row=document.createElement('div'); row.className='flex items-center gap-[9px]';\n  const {sw, inp}=swatchInput(key);\n  const lab=document.createElement('label'); lab.className='text-[12.5px] font-medium'; lab.textContent=label;\n  row.appendChild(sw); row.appendChild(lab); wrap.appendChild(row);\n  colorInputs[key]=inp;\n  return wrap;\n}\nfunction rebuildSliders(){\n  Object.entries(sliderRefs).forEach(([key,wrap])=>{\n    const inp=wrap.querySelector('input'); const em=wrap.querySelector('em');\n    inp.value=state[key];\n    const unit = SLIDERS_SHAPE.find(s=>s[0]===key)[2];\n    em.textContent=state[key]+unit;\n  });\n  applyState();\n}\n\nfunction highlightPreset(){\n  presetEls.forEach(el=>{\n    const on = el.dataset.name===state._preset;\n    el.classList.toggle('border-chrome-accent', on);\n    el.classList.toggle('ring-1', on);\n    el.classList.toggle('ring-chrome-accent', on);\n    el.classList.toggle('border-chrome-line', !on);\n  });\n}\n\nfunction applyPreset(name){\n  const def=PRESETS[name];\n  state={...DEFAULTS, ...def.v, _preset:name,\n    displaySize: def.v.displaySize||DEFAULTS.displaySize };\n  applyState(); buildPanel(); applyState(); buildKeypad(); highlightPreset();\n}\n\n/* randomize */\nfunction rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }\nfunction pick(arr){ return arr[rand(0,arr.length-1)]; }\nfunction randHue(){ return rand(0,360); }\nfunction hslToHex(h,s,l){\n  s/=100; l/=100;\n  const k=n=>(n+h/30)%12;\n  const a=s*Math.min(l,1-l);\n  const f=n=>{ const col=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return Math.round(255*col).toString(16).padStart(2,'0'); };\n  return '#'+f(0)+f(8)+f(4);\n}\nfunction oklchHex(l,c,h){ return hslToHex(h, c, l); } // l,c expressed as %, approximated as HSL\nfunction randomize(){\n  const dark = Math.random()<0.45;\n  const baseHue = randHue();\n  const accentHue = (baseHue + pick([30,150,180,210,330])) % 360;\n  const sat = rand(40,85);\n  if(dark){\n    state.stageBg = oklchHex(rand(6,12), rand(6,18), baseHue);\n    state.bodyBg = oklchHex(rand(10,18), rand(6,16), baseHue);\n    state.displayBg = oklchHex(rand(6,12), rand(4,12), baseHue);\n    state.displayText = oklchHex(rand(88,96), rand(4,14), accentHue);\n    state.digitBg = oklchHex(rand(18,28), rand(6,16), baseHue);\n    state.digitText = '#f3f1ec';\n    state.fnBg = oklchHex(rand(26,38), rand(6,16), baseHue);\n    state.fnText = '#f3f1ec';\n    state.opBg = oklchHex(rand(50,66), sat, accentHue);\n    state.opText = oklchHex(12, 8, accentHue);\n    state.eqBg = oklchHex(rand(52,66), sat, accentHue);\n    state.eqText = oklchHex(12, 8, accentHue);\n    state.borderCol = oklchHex(rand(28,40), 12, baseHue);\n  } else {\n    state.stageBg = oklchHex(rand(82,90), rand(6,18), baseHue);\n    state.bodyBg = oklchHex(rand(95,99), rand(2,8), baseHue);\n    state.displayBg = oklchHex(rand(92,98), rand(3,10), baseHue);\n    state.displayText = oklchHex(rand(14,24), rand(8,20), baseHue);\n    state.digitBg = oklchHex(rand(90,96), rand(4,12), baseHue);\n    state.digitText = oklchHex(rand(16,26), rand(6,16), baseHue);\n    state.fnBg = oklchHex(rand(82,90), rand(6,16), baseHue);\n    state.fnText = oklchHex(rand(20,30), rand(8,18), baseHue);\n    state.opBg = oklchHex(rand(58,70), sat, accentHue);\n    state.opText = '#ffffff';\n    state.eqBg = oklchHex(rand(56,68), sat, accentHue);\n    state.eqText = '#ffffff';\n    state.borderCol = oklchHex(rand(82,90), 10, baseHue);\n  }\n  state.opBorder = state.opBg;\n  state.font = pick(Object.keys(FONTS));\n  state.shape = pick(Object.keys(SHAPE_RADIUS));\n  if(state.shape!=='Circle' && SHAPE_RADIUS[state.shape]!==999) state.btnRadius=SHAPE_RADIUS[state.shape];\n  state.shadow = pick(['none','soft','hard','neu','glow']);\n  state.press = pick(['push','sink','pop']);\n  state.align = pick(['left','center','right']);\n  state.gap = rand(4,16);\n  state.bodyRadius = rand(8,44);\n  state.bodyPad = rand(10,28);\n  state.displayH = rand(80,180);\n  state.btnPad = rand(12,30);\n  state.calcW = rand(290,400);\n  state.displaySize = rand(40,68);\n  state.btnSize = rand(18,30);\n  state.borderW = state.shadow==='hard' ? rand(2,3) : pick([0,0,0,1,2]);\n  state.zeroDouble = Math.random()<0.6;\n  state._preset = null;\n  applyState(); buildPanel(); applyState(); buildKeypad(); highlightPreset();\n}\n\nfunction reset(){\n  state={...DEFAULTS, _preset:'Classic'};\n  applyState(); buildPanel(); applyState(); buildKeypad(); highlightPreset();\n}\n\n/* ===================== INIT ===================== */\ndocument.getElementById('randomize').addEventListener('click', randomize);\ndocument.getElementById('reset').addEventListener('click', reset);\n\nbuildPanel();\napplyState();\nbuildKeypad();\nrender();\nhighlightPreset();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
